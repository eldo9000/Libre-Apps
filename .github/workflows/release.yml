name: Build & Release Apps

# Trigger: push a version tag (e.g. v0.1.0) to cut a release.
# Manual dispatch for testing builds without publishing.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── x86_64 build ─────────────────────────────────────────────────────────
  build-x86_64:
    name: Build ${{ matrix.app }} (x86_64)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { app: shelf, repo: Shelf-App }
          - { app: prism, repo: Prism-App }
          - { app: stack, repo: Stack-App }
          - { app: ghost, repo: Ghost-App }
          - { app: fade,  repo: Fade-App  }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            minisign

      - name: Verify CARGO_DEPS_TOKEN can read ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.CARGO_DEPS_TOKEN }}
        run: |
          if ! gh api "repos/eldo9000/${{ matrix.repo }}" --silent 2>/dev/null; then
            echo "::error::CARGO_DEPS_TOKEN cannot read eldo9000/${{ matrix.repo }}."
            echo "::error::Rotate the token or grant it repo-read scope for this repo."
            exit 1
          fi

      - name: Checkout ${{ matrix.app }} source
        uses: actions/checkout@v6
        with:
          repository: eldo9000/${{ matrix.repo }}
          token: ${{ secrets.CARGO_DEPS_TOKEN }}
          path: apps/${{ matrix.app }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: apps/${{ matrix.app }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Build ${{ matrix.app }}
        working-directory: apps/${{ matrix.app }}
        run: npx tauri build --no-bundle

      - name: Locate and rename binary
        run: |
          BINARY=$(find apps/${{ matrix.app }}/src-tauri/target/release -maxdepth 1 -name "${{ matrix.app }}" -type f | head -1)
          if [[ -z "$BINARY" ]]; then
            echo "ERROR: Could not find binary for ${{ matrix.app }}"
            find apps/${{ matrix.app }}/src-tauri/target/release -maxdepth 1 -type f | head -20
            exit 1
          fi
          echo "Found: $BINARY"
          cp "$BINARY" "${{ matrix.app }}-x86_64"
          ls -lh "${{ matrix.app }}-x86_64"

      - name: Sign binary
        env:
          MINISIGN_KEY_PROD: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_KEY_DEV: ${{ secrets.MINISIGN_KEY_DEV }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            KEY="$MINISIGN_KEY_PROD"
            COMMENT="librewin-releases $GITHUB_REF_NAME ${{ matrix.app }}-x86_64"
          else
            KEY="$MINISIGN_KEY_DEV"
            COMMENT="librewin-dev $GITHUB_SHA ${{ matrix.app }}-x86_64"
          fi
          echo "$KEY" > /tmp/minisign.key
          minisign -Sm "${{ matrix.app }}-x86_64" -s /tmp/minisign.key -t "$COMMENT"
          rm -f /tmp/minisign.key
          echo "Signed: ${{ matrix.app }}-x86_64.minisig"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.app }}-x86_64
          path: |
            ${{ matrix.app }}-x86_64
            ${{ matrix.app }}-x86_64.minisig
          retention-days: 1

  # ── aarch64 build ────────────────────────────────────────────────────────
  build-aarch64:
    name: Build ${{ matrix.app }} (aarch64)
    runs-on: ubuntu-24.04-arm

    strategy:
      fail-fast: false
      matrix:
        include:
          - { app: shelf, repo: Shelf-App }
          - { app: prism, repo: Prism-App }
          - { app: stack, repo: Stack-App }
          - { app: ghost, repo: Ghost-App }
          - { app: fade,  repo: Fade-App  }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            minisign

      - name: Verify CARGO_DEPS_TOKEN can read ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.CARGO_DEPS_TOKEN }}
        run: |
          if ! gh api "repos/eldo9000/${{ matrix.repo }}" --silent 2>/dev/null; then
            echo "::error::CARGO_DEPS_TOKEN cannot read eldo9000/${{ matrix.repo }}."
            echo "::error::Rotate the token or grant it repo-read scope for this repo."
            exit 1
          fi

      - name: Checkout ${{ matrix.app }} source
        uses: actions/checkout@v6
        with:
          repository: eldo9000/${{ matrix.repo }}
          token: ${{ secrets.CARGO_DEPS_TOKEN }}
          path: apps/${{ matrix.app }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: apps/${{ matrix.app }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Build ${{ matrix.app }}
        working-directory: apps/${{ matrix.app }}
        run: npx tauri build --no-bundle

      - name: Locate and rename binary
        run: |
          BINARY=$(find apps/${{ matrix.app }}/src-tauri/target/release -maxdepth 1 -name "${{ matrix.app }}" -type f | head -1)
          if [[ -z "$BINARY" ]]; then
            echo "ERROR: Could not find binary for ${{ matrix.app }}"
            find apps/${{ matrix.app }}/src-tauri/target/release -maxdepth 1 -type f | head -20
            exit 1
          fi
          echo "Found: $BINARY"
          cp "$BINARY" "${{ matrix.app }}-aarch64"
          ls -lh "${{ matrix.app }}-aarch64"

      - name: Sign binary
        env:
          MINISIGN_KEY_PROD: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_KEY_DEV: ${{ secrets.MINISIGN_KEY_DEV }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            KEY="$MINISIGN_KEY_PROD"
            COMMENT="librewin-releases $GITHUB_REF_NAME ${{ matrix.app }}-aarch64"
          else
            KEY="$MINISIGN_KEY_DEV"
            COMMENT="librewin-dev $GITHUB_SHA ${{ matrix.app }}-aarch64"
          fi
          echo "$KEY" > /tmp/minisign.key
          minisign -Sm "${{ matrix.app }}-aarch64" -s /tmp/minisign.key -t "$COMMENT"
          rm -f /tmp/minisign.key
          echo "Signed: ${{ matrix.app }}-aarch64.minisig"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.app }}-aarch64
          path: |
            ${{ matrix.app }}-aarch64
            ${{ matrix.app }}-aarch64.minisig
          retention-days: 1

  # ── Collect and sign .desktop files ──────────────────────────────────────
  collect-desktop-files:
    name: Collect .desktop files
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install minisign
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends minisign

      - name: Verify CARGO_DEPS_TOKEN can read all app repos
        env:
          GH_TOKEN: ${{ secrets.CARGO_DEPS_TOKEN }}
        run: |
          declare -A REPOS=(
            [shelf]=Shelf-App
            [stack]=Stack-App
            [prism]=Prism-App
            [fade]=Fade-App
            [ghost]=Ghost-App
          )
          failed=0
          for app in "${!REPOS[@]}"; do
            if ! gh api "repos/eldo9000/${REPOS[$app]}" --silent 2>/dev/null; then
              echo "::error::CARGO_DEPS_TOKEN cannot read eldo9000/${REPOS[$app]} (app=$app)"
              failed=1
            fi
          done
          [ $failed -eq 0 ] || { echo "::error::Rotate CARGO_DEPS_TOKEN or grant repo-read scope."; exit 1; }

      - name: Checkout app sources
        run: |
          declare -A REPOS=(
            [shelf]=Shelf-App
            [stack]=Stack-App
            [prism]=Prism-App
            [fade]=Fade-App
            [ghost]=Ghost-App
          )
          for app in "${!REPOS[@]}"; do
            gh repo clone "eldo9000/${REPOS[$app]}" "apps/$app" -- --depth=1
          done
        env:
          GH_TOKEN: ${{ secrets.CARGO_DEPS_TOKEN }}

      - name: Bundle .desktop files
        run: |
          mkdir -p desktop-files
          for app in shelf prism stack ghost fade; do
            SRC="apps/$app/io.librewin.$app.desktop"
            if [[ -f "$SRC" ]]; then
              cp "$SRC" "desktop-files/$app.desktop"
              echo "Bundled: $app.desktop"
            else
              echo "WARNING: $SRC not found — skipping"
            fi
          done
          ls -lh desktop-files/

      - name: Sign .desktop files
        env:
          MINISIGN_KEY_PROD: ${{ secrets.MINISIGN_KEY }}
        run: |
          echo "$MINISIGN_KEY_PROD" > /tmp/minisign.key
          for desktop in desktop-files/*.desktop; do
            [[ -f "$desktop" ]] || continue
            NAME=$(basename "$desktop")
            COMMENT="librewin-releases $GITHUB_REF_NAME $NAME"
            minisign -Sm "$desktop" -s /tmp/minisign.key -t "$COMMENT"
            echo "Signed: $NAME.minisig"
          done
          rm -f /tmp/minisign.key
          ls -lh desktop-files/

      - name: Upload .desktop files artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-files
          path: desktop-files/
          retention-days: 1

  # ── Generate and sign SBOMs ──────────────────────────────────────────────
  generate-sbom:
    name: Generate SBOMs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install minisign
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends minisign

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Verify CARGO_DEPS_TOKEN can read all app repos
        env:
          GH_TOKEN: ${{ secrets.CARGO_DEPS_TOKEN }}
        run: |
          declare -A REPOS=(
            [shelf]=Shelf-App
            [stack]=Stack-App
            [prism]=Prism-App
            [fade]=Fade-App
            [ghost]=Ghost-App
          )
          failed=0
          for app in "${!REPOS[@]}"; do
            if ! gh api "repos/eldo9000/${REPOS[$app]}" --silent 2>/dev/null; then
              echo "::error::CARGO_DEPS_TOKEN cannot read eldo9000/${REPOS[$app]} (app=$app)"
              failed=1
            fi
          done
          [ $failed -eq 0 ] || { echo "::error::Rotate CARGO_DEPS_TOKEN or grant repo-read scope."; exit 1; }

      - name: Checkout app sources
        run: |
          declare -A REPOS=(
            [shelf]=Shelf-App
            [stack]=Stack-App
            [prism]=Prism-App
            [fade]=Fade-App
            [ghost]=Ghost-App
          )
          for app in "${!REPOS[@]}"; do
            gh repo clone "eldo9000/${REPOS[$app]}" "apps/$app" -- --depth=1
          done
        env:
          GH_TOKEN: ${{ secrets.CARGO_DEPS_TOKEN }}

      - name: Generate SBOMs
        run: |
          mkdir -p sbom
          for app in shelf stack prism fade ghost; do
            echo "Generating SBOM: $app"
            syft "apps/$app" \
              --output cyclonedx-json \
              --file "sbom/$app.sbom.json"
          done
          ls -lh sbom/

      - name: Sign SBOMs
        env:
          MINISIGN_KEY_PROD: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_KEY_DEV: ${{ secrets.MINISIGN_KEY_DEV }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            KEY="$MINISIGN_KEY_PROD"
          else
            KEY="$MINISIGN_KEY_DEV"
          fi
          echo "$KEY" > /tmp/minisign.key
          for sbom in sbom/*.sbom.json; do
            [[ -f "$sbom" ]] || continue
            NAME=$(basename "$sbom")
            COMMENT="librewin-releases $GITHUB_REF_NAME $NAME"
            minisign -Sm "$sbom" -s /tmp/minisign.key -t "$COMMENT"
            echo "Signed: $NAME.minisig"
          done
          rm -f /tmp/minisign.key
          ls -lh sbom/

      - name: Upload SBOMs artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom/
          retention-days: 1

  # ── Generate, stamp, and sign manifests ──────────────────────────────────
  generate-manifests:
    name: Generate manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install minisign
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends minisign

      - name: Verify CARGO_DEPS_TOKEN can read all app repos
        env:
          GH_TOKEN: ${{ secrets.CARGO_DEPS_TOKEN }}
        run: |
          declare -A REPOS=(
            [shelf]=Shelf-App
            [stack]=Stack-App
            [prism]=Prism-App
            [fade]=Fade-App
            [ghost]=Ghost-App
          )
          failed=0
          for app in "${!REPOS[@]}"; do
            if ! gh api "repos/eldo9000/${REPOS[$app]}" --silent 2>/dev/null; then
              echo "::error::CARGO_DEPS_TOKEN cannot read eldo9000/${REPOS[$app]} (app=$app)"
              failed=1
            fi
          done
          [ $failed -eq 0 ] || { echo "::error::Rotate CARGO_DEPS_TOKEN or grant repo-read scope."; exit 1; }

      - name: Checkout app sources
        run: |
          declare -A REPOS=(
            [shelf]=Shelf-App
            [stack]=Stack-App
            [prism]=Prism-App
            [fade]=Fade-App
            [ghost]=Ghost-App
          )
          for app in "${!REPOS[@]}"; do
            gh repo clone "eldo9000/${REPOS[$app]}" "apps/$app" -- --depth=1
          done
        env:
          GH_TOKEN: ${{ secrets.CARGO_DEPS_TOKEN }}

      - name: Stamp and validate manifests
        run: |
          python3 - <<'PYEOF'
          import json, sys, os, datetime

          apps = ['shelf', 'stack', 'prism', 'fade', 'ghost']
          git_ref  = os.environ.get('GITHUB_REF_NAME', 'unknown')
          git_sha  = os.environ.get('GITHUB_SHA', 'unknown')[:8]
          build_date = datetime.date.today().isoformat()
          errors = []

          os.makedirs('manifests', exist_ok=True)

          for app in apps:
              manifest_path = f'apps/{app}/libre.manifest.json'
              tauri_path    = f'apps/{app}/src-tauri/tauri.conf.json'

              with open(manifest_path) as f:
                  manifest = json.load(f)
              with open(tauri_path) as f:
                  tauri = json.load(f)

              tauri_ver = tauri.get('version', '')
              tauri_id  = tauri.get('identifier', '')

              if manifest.get('version') != tauri_ver:
                  errors.append(f'{app}: manifest version {manifest["version"]!r} != tauri version {tauri_ver!r}')
              if manifest.get('id') != tauri_id:
                  errors.append(f'{app}: manifest id {manifest["id"]!r} != tauri identifier {tauri_id!r}')
              if manifest.get('schema_version') != 1:
                  errors.append(f'{app}: schema_version must be 1')

              if errors:
                  continue

              manifest['build'] = {
                  'ref':  git_ref,
                  'sha':  git_sha,
                  'date': build_date,
              }

              out = f'manifests/{app}.manifest.json'
              with open(out, 'w') as f:
                  json.dump(manifest, f, indent=2)
              print(f'Generated: {out}')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Sign manifests
        env:
          MINISIGN_KEY_PROD: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_KEY_DEV: ${{ secrets.MINISIGN_KEY_DEV }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            KEY="$MINISIGN_KEY_PROD"
          else
            KEY="$MINISIGN_KEY_DEV"
          fi
          echo "$KEY" > /tmp/minisign.key
          for manifest in manifests/*.manifest.json; do
            [[ -f "$manifest" ]] || continue
            NAME=$(basename "$manifest")
            COMMENT="librewin-releases $GITHUB_REF_NAME $NAME"
            minisign -Sm "$manifest" -s /tmp/minisign.key -t "$COMMENT"
            echo "Signed: $NAME.minisig"
          done
          rm -f /tmp/minisign.key
          ls -lh manifests/

      - name: Upload manifests artifact
        uses: actions/upload-artifact@v7
        with:
          name: manifests
          path: manifests/
          retention-days: 1

  # ── Publish GitHub Release ────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-x86_64, build-aarch64, collect-desktop-files, generate-manifests, generate-sbom]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/
          merge-multiple: false

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release and upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Create the release
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "The Freedom Apps $TAG" \
            --notes "Built from tag $TAG. Binaries for x86_64 and aarch64, plus .desktop files — consumed by the LibreWin OS build system via \`build/fetch-apps.sh\`. All artifacts are signed with minisign; see the Verifying Releases section in the README." \
            --verify-tag

          # Upload binaries and their signatures
          for artifact_dir in dist/*/; do
            ARTIFACT_NAME=$(basename "$artifact_dir")
            [[ "$ARTIFACT_NAME" == "desktop-files" ]] && continue
            for f in "$artifact_dir"*; do
              [[ -f "$f" ]] || continue
              echo "Uploading: $(basename $f)"
              gh release upload "$TAG" "$f" \
                --repo "$GITHUB_REPOSITORY" \
                --clobber
            done
          done

          # Upload .desktop files and their signatures
          for f in dist/desktop-files/*; do
            [[ -f "$f" ]] || continue
            echo "Uploading: $(basename $f)"
            gh release upload "$TAG" "$f" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          done

          # Upload manifests and their signatures
          for f in dist/manifests/*; do
            [[ -f "$f" ]] || continue
            echo "Uploading: $(basename $f)"
            gh release upload "$TAG" "$f" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          done

          # Upload SBOMs and their signatures
          for f in dist/sbom/*; do
            [[ -f "$f" ]] || continue
            echo "Uploading: $(basename $f)"
            gh release upload "$TAG" "$f" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          done

          echo "Release $TAG published."
