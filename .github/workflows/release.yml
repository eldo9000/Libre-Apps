name: Build & Release Apps

# Trigger: push a version tag (e.g. v0.1.0) to cut a release.
# Manual dispatch for testing builds without publishing.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── x86_64 build ─────────────────────────────────────────────────────────
  build-x86_64:
    name: Build ${{ matrix.app }} (x86_64)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app: [shelf, prism, stack, ghost, splice]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: apps

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Build ${{ matrix.app }}
        working-directory: apps/${{ matrix.app }}
        run: npx tauri build --no-bundle

      - name: Locate and rename binary
        run: |
          BINARY=$(find apps/target/release -maxdepth 1 -name "${{ matrix.app }}" -type f | head -1)
          if [[ -z "$BINARY" ]]; then
            echo "ERROR: Could not find binary for ${{ matrix.app }}"
            find apps/target/release -maxdepth 1 -type f | head -20
            exit 1
          fi
          echo "Found: $BINARY"
          cp "$BINARY" "${{ matrix.app }}-x86_64"
          ls -lh "${{ matrix.app }}-x86_64"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.app }}-x86_64
          path: ${{ matrix.app }}-x86_64
          retention-days: 1

  # ── aarch64 build ────────────────────────────────────────────────────────
  build-aarch64:
    name: Build ${{ matrix.app }} (aarch64)
    runs-on: ubuntu-24.04-arm

    strategy:
      fail-fast: false
      matrix:
        app: [shelf, prism, stack, ghost, splice]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: apps

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Build ${{ matrix.app }}
        working-directory: apps/${{ matrix.app }}
        run: npx tauri build --no-bundle

      - name: Locate and rename binary
        run: |
          BINARY=$(find apps/target/release -maxdepth 1 -name "${{ matrix.app }}" -type f | head -1)
          if [[ -z "$BINARY" ]]; then
            echo "ERROR: Could not find binary for ${{ matrix.app }}"
            find apps/target/release -maxdepth 1 -type f | head -20
            exit 1
          fi
          echo "Found: $BINARY"
          cp "$BINARY" "${{ matrix.app }}-aarch64"
          ls -lh "${{ matrix.app }}-aarch64"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.app }}-aarch64
          path: ${{ matrix.app }}-aarch64
          retention-days: 1

  # ── Collect .desktop files (arch-independent, fetched from source) ─────────
  collect-desktop-files:
    name: Collect .desktop files
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bundle .desktop files
        run: |
          mkdir -p desktop-files
          for app in shelf prism stack ghost splice; do
            SRC="apps/$app/io.librewin.$app.desktop"
            if [[ -f "$SRC" ]]; then
              cp "$SRC" "desktop-files/$app.desktop"
              echo "Bundled: $app.desktop"
            else
              echo "WARNING: $SRC not found — skipping"
            fi
          done
          ls -lh desktop-files/

      - name: Upload .desktop files artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-files
          path: desktop-files/
          retention-days: 1

  # ── Publish GitHub Release ────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-x86_64, build-aarch64, collect-desktop-files]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/
          merge-multiple: false

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Create the release
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "The Freedom Apps $TAG" \
            --notes "Built from tag $TAG. Binaries for x86_64 and aarch64, plus .desktop files — consumed by the LibreWin OS build system via \`build/fetch-apps.sh\`." \
            --verify-tag

          # Upload binaries
          for artifact_dir in dist/*/; do
            ARTIFACT_NAME=$(basename "$artifact_dir")
            [[ "$ARTIFACT_NAME" == "desktop-files" ]] && continue
            BINARY="$artifact_dir/$ARTIFACT_NAME"
            if [[ -f "$BINARY" ]]; then
              echo "Uploading binary: $ARTIFACT_NAME"
              gh release upload "$TAG" "$BINARY" \
                --repo "$GITHUB_REPOSITORY" \
                --clobber
            else
              echo "WARNING: Expected $BINARY but not found"
              ls "$artifact_dir" || true
            fi
          done

          # Upload .desktop files
          for desktop in dist/desktop-files/*.desktop; do
            [[ -f "$desktop" ]] || continue
            echo "Uploading desktop: $(basename $desktop)"
            gh release upload "$TAG" "$desktop" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          done

          echo "Release $TAG published."
