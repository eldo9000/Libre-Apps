# Libre Apps — workspace rustfmt configuration
# Applied via: cargo fmt --all (from apps/ directory)

edition                = "2021"
max_width              = 100
use_small_heuristics   = "Default"

# Import grouping: std / external / crate — one blank line between each
imports_granularity    = "Module"
group_imports          = "StdExternalCrate"

# Misc style
newline_style          = "Unix"
trailing_comma         = "Vertical"
match_block_trailing_comma = true
